<!DOCTYPE html>
<html lang="en" ng-app="myApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AngularJS Hello World</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-FTy9N8vNUnT3u+asZt8nD3Cn4yfP0Z+4kGHkL7V/E3+QbS0TQdBdH5rHTila5Hoz" crossorigin="anonymous">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #e0f7fa 0%, #80deea 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #102a43;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .welcome-card {
            border: none;
            border-radius: 1rem;
            background: rgba(255,255,255,0.95);
            box-shadow: 0 1rem 2rem rgba(16, 42, 67, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .welcome-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 1.5rem 3rem rgba(16, 42, 67, 0.3);
        }

        .form-control:focus {
            border-color: #007bff;
            box-shadow: 0 0 0 0.2rem rgba(0,123,255,0.25);
        }

        .greeting {
            color: #007bff;
            font-weight: 600;
            font-size: 2rem;
            margin-top: 1rem;
            transition: all 0.3s ease;
        }

        .greeting.ng-enter {
            opacity: 0;
            transform: scale(0.8);
        }

        .greeting.ng-enter-active {
            opacity: 1;
            transform: scale(1);
        }

        .header-text {
            font-weight: 700;
        }

        .card-text {
            font-size: 1rem;
            color: #3a506b;
        }

        @media (max-width: 576px) {
            .greeting {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body ng-controller="myController">
    <div class="card welcome-card p-5 col-md-6 col-lg-5 text-center">
        <h1 class="header-text mb-3 text-primary">Hello World with AngularJS</h1>
        <p class="card-text mb-4">Type your name below and watch the greeting update instantly!</p>
        <input type="text" ng-model="name" class="form-control mb-3 shadow-sm" placeholder="Enter your name">
        <h2 class="greeting">Hello {{name || 'User'}}!</h2>
    </div>

    <script>
        var app = angular.module("myApp", []);
        app.controller("myController", function($scope) {
            $scope.name = "";
        });
    </script>
</body>
</html>
