<!DOCTYPE html>
<html lang="en" ng-app="shoppingApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AngularJS Shopping Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <style>
        body {
            background: #f5f5f5;
            font-family: 'Segoe UI', sans-serif;
            padding: 2rem;
        }
        h1 {
            text-align: center;
            margin-bottom: 2rem;
            color: #0b4f6c;
        }
        .card {
            border-radius: 1rem;
        }
        .product-img {
            height: 100px;
            object-fit: cover;
        }
        .cart-table input {
            width: 60px;
            text-align: center;
        }
        .btn-clear {
            float: right;
        }
    </style>
</head>
<body ng-controller="cartController">

<h1>Shopping Cart</h1>

<!-- Product List -->
<div class="row mb-4">
    <div class="col-md-3 mb-3" ng-repeat="product in products">
        <div class="card h-100 shadow-sm">
            <img ng-src="{{product.image}}" class="card-img-top product-img" alt="{{product.name}}">
            <div class="card-body">
                <h5 class="card-title">{{product.name}}</h5>
                <p class="card-text">Price: ${{product.price}}</p>
                <div class="d-grid">
                    <button class="btn btn-primary" ng-click="addToCart(product)">Add to Cart</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Cart Table -->
<div class="card p-3 shadow-sm">
    <h4>Cart 
        <button class="btn btn-sm btn-danger btn-clear" ng-click="clearCart()" ng-show="cart.length">Clear Cart</button>
    </h4>
    <table class="table table-bordered cart-table mb-0" ng-if="cart.length">
        <thead class="table-light">
            <tr>
                <th>#</th>
                <th>Product</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Subtotal</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr ng-repeat="item in cart track by $index">
                <td>{{$index + 1}}</td>
                <td>{{item.name}}</td>
                <td>${{item.price}}</td>
                <td>
                    <input type="number" ng-model="item.quantity" min="1" ng-change="updateCart()" required>
                </td>
                <td>${{item.price * item.quantity | number:2}}</td>
                <td>
                    <button class="btn btn-sm btn-danger" ng-click="removeItem($index)">Remove</button>
                </td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <th colspan="4" class="text-end">Total:</th>
                <th colspan="2">${{getTotal() | number:2}}</th>
            </tr>
        </tfoot>
    </table>
    <p class="text-center text-muted" ng-if="cart.length === 0">Cart is empty</p>
</div>

<!-- AngularJS Script -->
<script>
    var app = angular.module("shoppingApp", []);
    app.controller("cartController", function($scope) {
        // Sample product list
        $scope.products = [
            {id: 1, name: "Apple iPhone 14", price: 999, image: "https://via.placeholder.com/150"},
            {id: 2, name: "Samsung Galaxy S23", price: 899, image: "https://via.placeholder.com/150"},
            {id: 3, name: "Sony Headphones", price: 199, image: "https://via.placeholder.com/150"},
            {id: 4, name: "Dell Laptop", price: 1200, image: "https://via.placeholder.com/150"}
        ];

        // Load cart from localStorage
        $scope.cart = JSON.parse(localStorage.getItem('cart')) || [];

        // Save cart to localStorage
        function saveCart() {
            localStorage.setItem('cart', JSON.stringify($scope.cart));
        }

        // Add product to cart
        $scope.addToCart = function(product) {
            var found = $scope.cart.find(item => item.id === product.id);
            if (found) {
                found.quantity += 1;
            } else {
                $scope.cart.push({...product, quantity: 1});
            }
            saveCart();
        };

        // Remove item
        $scope.removeItem = function(index) {
            $scope.cart.splice(index, 1);
            saveCart();
        };

        // Update quantities
        $scope.updateCart = function() {
            $scope.cart = $scope.cart.filter(item => item.quantity > 0);
            saveCart();
        };

        // Clear cart
        $scope.clearCart = function() {
            if (confirm("Are you sure you want to clear the cart?")) {
                $scope.cart = [];
                saveCart();
            }
        };

        // Get total price
        $scope.getTotal = function() {
            return $scope.cart.reduce((total, item) => total + item.price * item.quantity, 0);
        };
    });
</script>

</body>
</html>
