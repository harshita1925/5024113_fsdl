<!DOCTYPE html>
<html lang="en" ng-app="studentApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Records App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body ng-controller="studentController">

<div class="container py-5">
    <h1 class="text-center mb-4">Student Records</h1>

    <!-- Student Form -->
    <div class="card p-4 mb-4 shadow-sm">
        <form name="studentForm" ng-submit="addStudent()" novalidate>
            <div class="row g-3">
                <div class="col-md-4">
                    <input type="text" class="form-control" ng-model="student.name" placeholder="Name" required>
                    <div class="text-danger" ng-show="studentForm.$submitted && !student.name">Name is required</div>
                </div>
                <div class="col-md-4">
                    <input type="email" class="form-control" ng-model="student.email" placeholder="Email" required>
                    <div class="text-danger" ng-show="studentForm.$submitted && !student.email">Valid email required</div>
                </div>
                <div class="col-md-2">
                    <input type="number" class="form-control" ng-model="student.age" placeholder="Age" required min="1">
                    <div class="text-danger" ng-show="studentForm.$submitted && !student.age">Valid age required</div>
                </div>
                <div class="col-md-2 d-grid">
                    <button class="btn btn-primary" type="submit">{{editIndex !== null ? 'Update' : 'Add'}}</button>
                </div>
            </div>
        </form>
    </div>

    <!-- Student Table -->
    <div class="card p-4 shadow-sm">
        <table class="table table-bordered table-striped mb-0">
            <thead class="table-light">
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Age</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr ng-repeat="s in students track by $index">
                    <td>{{$index + 1}}</td>
                    <td>{{s.name}}</td>
                    <td>{{s.email}}</td>
                    <td>{{s.age}}</td>
                    <td>
                        <button class="btn btn-sm btn-warning me-2" ng-click="editStudent($index)">Edit</button>
                        <button class="btn btn-sm btn-danger" ng-click="deleteStudent($index)">Delete</button>
                    </td>
                </tr>
                <tr ng-if="students.length === 0">
                    <td colspan="5" class="text-center">No records found</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
