<!DOCTYPE html>
<html lang="en" ng-app="studentApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Records App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #f0f4f8, #d9e8fc);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            padding: 2rem;
        }
        h1 {
            color: #0b4f6c;
            text-align: center;
            margin-bottom: 2rem;
        }
        .card {
            border-radius: 1rem;
            margin-bottom: 2rem;
        }
        .form-control.ng-invalid.ng-touched {
            border-color: #dc3545;
        }
        .form-control.ng-valid.ng-touched {
            border-color: #198754;
        }
    </style>
</head>
<body ng-controller="studentController">

    <h1>Student Records App</h1>

    <!-- Student Form -->
    <div class="card p-4 shadow-sm">
        <form name="studentForm" ng-submit="addStudent()" novalidate>
            <div class="row g-3">
                <div class="col-md-4">
                    <input type="text" class="form-control" ng-model="student.name" placeholder="Name" required ng-touched>
                    <div class="text-danger" ng-show="studentForm.$submitted && !student.name">Name is required</div>
                </div>
                <div class="col-md-4">
                    <input type="email" class="form-control" ng-model="student.email" placeholder="Email" required>
                    <div class="text-danger" ng-show="studentForm.$submitted && studentForm.email.$invalid">Valid email required</div>
                </div>
                <div class="col-md-2">
                    <input type="number" class="form-control" ng-model="student.age" placeholder="Age" required min="1">
                    <div class="text-danger" ng-show="studentForm.$submitted && !student.age">Valid age required</div>
                </div>
                <div class="col-md-2 d-grid">
                    <button class="btn btn-primary" type="submit">{{editIndex !== null ? 'Update' : 'Add'}}</button>
                </div>
            </div>
        </form>
    </div>

    <!-- Student Table -->
    <div class="card p-4 shadow-sm">
        <table class="table table-bordered table-striped mb-0">
            <thead class="table-light">
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Age</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr ng-repeat="s in students track by $index">
                    <td>{{$index + 1}}</td>
                    <td>{{s.name}}</td>
                    <td>{{s.email}}</td>
                    <td>{{s.age}}</td>
                    <td>
                        <button class="btn btn-sm btn-warning me-2" ng-click="editStudent($index)">Edit</button>
                        <button class="btn btn-sm btn-danger" ng-click="deleteStudent($index)">Delete</button>
                    </td>
                </tr>
                <tr ng-if="students.length === 0">
                    <td colspan="5" class="text-center">No records found</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- AngularJS Script -->
    <script>
        var app = angular.module("studentApp", []);
        app.controller("studentController", function($scope) {
            // Load students from localStorage
            $scope.students = JSON.parse(localStorage.getItem('students')) || [];
            $scope.student = {};
            $scope.editIndex = null;

            // Save to localStorage
            function saveStudents() {
                localStorage.setItem('students', JSON.stringify($scope.students));
            }

            // Add or Update student
            $scope.addStudent = function() {
                if (!$scope.studentForm.$valid) return;

                if ($scope.editIndex === null) {
                    $scope.students.push(angular.copy($scope.student));
                } else {
                    $scope.students[$scope.editIndex] = angular.copy($scope.student);
                    $scope.editIndex = null;
                }

                $scope.student = {};
                $scope.studentForm.$setPristine();
                $scope.studentForm.$setUntouched();
                saveStudents();
            };

            // Edit student
            $scope.editStudent = function(index) {
                $scope.student = angular.copy($scope.students[index]);
                $scope.editIndex = index;
            };

            // Delete student
            $scope.deleteStudent = function(index) {
                if (confirm("Are you sure you want to delete this record?")) {
                    $scope.students.splice(index, 1);
                    saveStudents();
                }
            };
        });
    </script>
</body>
</html>
