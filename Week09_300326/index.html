<!DOCTYPE html>
<html>
<head>
    <title>AngularJS Hello World</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-FTy9N8vNUnT3u+asZt8nD3Cn4yfP0Z+4kGHkL7V/E3+QbS0TQdBdH5rHTila5Hoz" crossorigin="anonymous">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #f8f9fa 0%, #d0e7ff 100%);
            color: #102a43;
            min-height: 100vh;
        }
        .welcome-card {
            border: 2px solid #0b4f6c;
            background: rgba(255,255,255,0.92);
            box-shadow: 0 0.75rem 1.5rem rgba(16, 42, 67, 0.15);
        }
        .form-control:focus {
            border-color: #0b4f6c;
            box-shadow: 0 0 0 0.2rem rgba(11, 79, 108, 0.25);
        }
        .greeting {
            color: #035388;
        }
    </style>
</head>

<body ng-app="myApp">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-6">
                <div class="card welcome-card p-4">
                    <div class="card-body">
                        <h1 class="card-title text-primary mb-3">Hello World using AngularJS</h1>
                        <p class="card-text text-secondary">Enter your name below and see the greeting update instantly.</p>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Name</label>
                            <input type="text" ng-model="name" class="form-control" placeholder="Enter your name">
                        </div>
                        <h2 class="greeting">Hello {{name}}</h2>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        var app = angular.module("myApp", []);

        app.controller("myController", function($scope) {
            $scope.name = "User";
        });
    </script>

</body>
</html>
